name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup node js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend eslint
        working-directory: frontend
        run: npm run lint:eslint:ci

      - name: Run frontend prettier check
        working-directory: frontend
        run: npm run format:check

      - name: Run frontend test coverage
        working-directory: frontend
        run: npm run test:coverage
        env:
          VITE_ENV: test
          VITE_API_BASE_URL: http://localhost:8000

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_ENV: production
          VITE_API_BASE_URL: https://api.jobaspirations.in
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup node js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend eslint
        working-directory: backend
        run: npm run lint

      - name: Run backend prettier check
        working-directory: backend
        run: npm run format:check